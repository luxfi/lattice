name: CI Checks
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  checks:
    name: Run static checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-tools

    - name: Setup tools
      run: make get_tools

    - name: Run Makefile checks
      run: make checks

  tests:
    name: Run Go ${{ matrix.go }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go }}-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-build-

      - name: Build
        run: go build ./...

      - name: Run Makefile tests
        run: make test

  tests-simd:
    name: Run SIMD NTT tests (GOEXPERIMENT=simd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-simd-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-simd-build-

      - name: Build with SIMD
        run: GOEXPERIMENT=simd go build ./...

      - name: Test with SIMD
        run: GOEXPERIMENT=simd go test -count=1 ./ring/ -v -run 'TestNTT|TestMRedLazy4|TestMul64x4|TestNTTSimd'
